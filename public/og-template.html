<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<style>
  @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;600;700;800&display=swap");

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: "Manrope", system-ui, sans-serif;
    background-color: #e7f3ec;
    background:
      radial-gradient(900px 520px at -5% -8%, rgba(79,184,178,0.36), transparent 55%),
      radial-gradient(850px 520px at 108% -10%, rgba(47,106,74,0.22), transparent 60%),
      radial-gradient(600px 320px at 50% 120%, rgba(79,184,178,0.13), transparent 65%),
      linear-gradient(180deg, #daeee3 0%, #f3faf5 44%, #e7f3ec 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 72px;
    position: relative;
  }

  /* grid texture */
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.1;
    background-image:
      linear-gradient(rgba(255,255,255,0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at 50% 30%, black, transparent 78%);
    pointer-events: none;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(79,184,178,0.14);
    border: 1.5px solid rgba(79,184,178,0.35);
    color: #246f76;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    width: fit-content;
    margin-bottom: 28px;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    background: #4fb8b2;
    border-radius: 50%;
  }

  h1 {
    font-family: "Fraunces", serif;
    font-size: 72px;
    font-weight: 700;
    color: #173a40;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }

  h1 span {
    color: #328f97;
  }

  p {
    font-size: 22px;
    font-weight: 500;
    color: #416166;
    line-height: 1.45;
    max-width: 640px;
  }

  .domain {
    position: absolute;
    bottom: 40px;
    right: 72px;
    font-size: 16px;
    font-weight: 700;
    color: rgba(65,97,102,0.5);
    letter-spacing: 0.01em;
  }

  /* map pin cluster decorative */
  .pins {
    position: absolute;
    right: 64px;
    top: 50%;
    transform: translateY(-50%);
    width: 300px;
    height: 300px;
  }

  .pin {
    position: absolute;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
  }

  .pin-lg {
    width: 56px; height: 56px;
    background: #4fb8b2;
    top: 80px; left: 120px;
    box-shadow: 0 8px 32px rgba(79,184,178,0.4);
  }

  .pin-lg::after {
    content: "";
    position: absolute;
    width: 22px; height: 22px;
    background: white;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .pin-md {
    width: 40px; height: 40px;
    background: #2f6a4a;
    top: 30px; left: 50px;
    box-shadow: 0 6px 20px rgba(47,106,74,0.35);
  }

  .pin-md::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .pin-sm {
    width: 30px; height: 30px;
    background: #4fb8b2;
    opacity: 0.6;
    top: 180px; left: 200px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(79,184,178,0.25);
  }

  .ring-1 { width: 90px; height: 90px; top: 63px; left: 103px; }
  .ring-2 { width: 130px; height: 130px; top: 43px; left: 83px; }
</style>
</head>
<body>
  <div class="badge">
    <span class="badge-dot"></span>
    Venezuela · En tiempo real
  </div>

  <h1>Reportes de<br>emergencia <span>en Venezuela</span></h1>

  <p>Mapa colaborativo para reportar y consultar<br>incidentes, sismos y alertas.</p>

  <div class="pins">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="pin pin-lg"></div>
    <div class="pin pin-md"></div>
    <div class="pin pin-sm"></div>
  </div>

  <div class="domain">ayudave.com</div>
</body>
</html>
